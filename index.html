<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>透過動画メーカー Ultimate</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

canvas{
  width:90vw;
  max-width:1100px;
  border-radius:12px;

  background:
  linear-gradient(45deg,#888 25%,transparent 25%),
  linear-gradient(-45deg,#888 25%,transparent 25%),
  linear-gradient(45deg,transparent 75%,#888 75%),
  linear-gradient(-45deg,transparent 75%,#888 75%);

  background-size:20px 20px;
  background-position:0 0,0 10px,10px -10px,-10px 0;
}

button,input,select{
  margin:8px;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#4cafef;
  color:white;
  cursor:pointer;
}

a{
  color:#4cafef;
  font-size:20px;
}

.controls{
  margin-bottom:20px;
}
</style>
</head>
<body>

<h1>2K 60FPS 透過動画メーカー</h1>

<div class="controls">

<input type="file" id="videoInput" accept="video/*">

<br>

<label>消す色:</label>
<input type="color" id="color" value="#00ff00">

<br>

<label>許容範囲:</label>
<input type="range" id="tol" min="0" max="255" value="80">
<span id="tolText">80</span>

<br>

<label>保存形式:</label>

<select id="format">
  <option value="webm">WebM (高速・透明対応)</option>
  <option value="mov">MOV (Canva向け)</option>
</select>

<br>

<button id="start">変換開始</button>

</div>

<video id="video" style="display:none"></video>

<canvas id="canvas"></canvas>

<br><br>

<a id="download"></a>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

const ctx = canvas.getContext("2d",{
  willReadFrequently:true
});

const videoInput = document.getElementById("videoInput");

const colorInput = document.getElementById("color");

const tol = document.getElementById("tol");
const tolText = document.getElementById("tolText");

const startBtn = document.getElementById("start");

const download = document.getElementById("download");

const formatSelect =
  document.getElementById("format");

let recorder;
let chunks = [];
let animationId;

// ===== 設定 =====

const OUTPUT_WIDTH = 2560;
const OUTPUT_HEIGHT = 1440;

const OUTPUT_FPS = 60;

const VIDEO_BITRATE = 40000000;

// =================

tol.oninput = ()=>{

  tolText.textContent = tol.value;

};

videoInput.onchange = e=>{

  const file = e.target.files[0];

  if(file){

    video.src = URL.createObjectURL(file);

  }

};

function hexToRgb(hex){

  const n = parseInt(hex.slice(1),16);

  return{
    r:(n>>16)&255,
    g:(n>>8)&255,
    b:n&255
  };

}

function render(){

  if(video.paused || video.ended){

    cancelAnimationFrame(animationId);

    recorder.stop();

    return;

  }

  canvas.width = OUTPUT_WIDTH;
  canvas.height = OUTPUT_HEIGHT;

  ctx.drawImage(
    video,
    0,
    0,
    OUTPUT_WIDTH,
    OUTPUT_HEIGHT
  );

  const frame = ctx.getImageData(
    0,
    0,
    OUTPUT_WIDTH,
    OUTPUT_HEIGHT
  );

  const data = frame.data;

  const key = hexToRgb(colorInput.value);

  const tolerance = Number(tol.value);

  for(let i=0;i<data.length;i+=4){

    const r = data[i];
    const g = data[i+1];
    const b = data[i+2];

    const dist = Math.sqrt(
      (r-key.r)**2+
      (g-key.g)**2+
      (b-key.b)**2
    );

    if(dist < tolerance){

      data[i+3] = 0;

    }

  }

  ctx.putImageData(frame,0,0);

  animationId = requestAnimationFrame(render);

}

startBtn.onclick = async ()=>{

  if(!video.src){

    alert("動画を選択して！");
    return;

  }

  chunks = [];

  canvas.width = OUTPUT_WIDTH;
  canvas.height = OUTPUT_HEIGHT;

  const stream = canvas.captureStream(
    OUTPUT_FPS
  );

  const selectedFormat =
    formatSelect.value;

  let mimeType =
    "video/webm;codecs=vp9";

  recorder = new MediaRecorder(stream,{

    mimeType,

    videoBitsPerSecond:
      VIDEO_BITRATE

  });

  recorder.ondataavailable = e=>{

    if(e.data.size > 0){

      chunks.push(e.data);

    }

  };

  recorder.onstop = ()=>{

    let extension = "webm";

    if(selectedFormat === "mov"){

      extension = "mov";

    }

    const blob = new Blob(chunks,{
      type:"video/webm"
    });

    const url = URL.createObjectURL(blob);

    download.href = url;

    download.download =
      "transparent-video." + extension;

    download.textContent =
      extension.toUpperCase() +
      "をダウンロード";

  };

  video.currentTime = 0;

  await video.play();

  recorder.start(100);

  render();

};

</script>

</body>
</html>
