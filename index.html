<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>透明動画メーカー</title>

<style>
body{
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
}

.controls{
  margin-bottom:15px;
}

canvas{
  max-width:90vw;
  border-radius:12px;

  background:
  linear-gradient(45deg,#999 25%,transparent 25%),
  linear-gradient(-45deg,#999 25%,transparent 25%),
  linear-gradient(45deg,transparent 75%,#999 75%),
  linear-gradient(-45deg,transparent 75%,#999 75%);

  background-size:20px 20px;
  background-position:0 0,0 10px,10px -10px,-10px 0px;
}

button,input{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#4cafef;
  color:white;
  cursor:pointer;
}

#download{
  display:none;
  font-size:20px;
  color:#4cafef;
}
</style>
</head>
<body>

<h1>好きな色を背景透過</h1>

<div class="controls">

<input type="file" id="videoInput" accept="video/*">

<br>

<label>消す色:</label>
<input type="color" id="color" value="#00ff00">

<br>

<label>強さ:</label>
<input type="range" id="tol" min="0" max="255" value="80">
<span id="tolText">80</span>

<br>

<button id="start">開始</button>

</div>

<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>

<br><br>

<a id="download">透明動画をダウンロード</a>

<script>

const videoInput = document.getElementById("videoInput");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d",{willReadFrequently:true});

const colorInput = document.getElementById("color");
const tol = document.getElementById("tol");
const tolText = document.getElementById("tolText");

const startBtn = document.getElementById("start");
const download = document.getElementById("download");

let mediaRecorder;
let chunks = [];
let recording = false;

tol.oninput = ()=>{
  tolText.textContent = tol.value;
};

videoInput.onchange = e=>{

  const file = e.target.files[0];

  if(file){
    video.src = URL.createObjectURL(file);
  }

};

function hexToRgb(hex){

  const n = parseInt(hex.slice(1),16);

  return{
    r:(n>>16)&255,
    g:(n>>8)&255,
    b:n&255
  };

}

function render(){

  if(video.paused || video.ended){

    if(recording){

      recording = false;
      mediaRecorder.stop();

    }

    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const frame = ctx.getImageData(
    0,
    0,
    canvas.width,
    canvas.height
  );

  const data = frame.data;

  const key = hexToRgb(colorInput.value);
  const tolerance = Number(tol.value);

  for(let i=0;i<data.length;i+=4){

    const r = data[i];
    const g = data[i+1];
    const b = data[i+2];

    const dist = Math.sqrt(
      (r-key.r)**2+
      (g-key.g)**2+
      (b-key.b)**2
    );

    if(dist < tolerance){

      data[i+3] = 0;

    }

  }

  ctx.putImageData(frame,0,0);

  requestAnimationFrame(render);

}

startBtn.onclick = async ()=>{

  if(!video.src){

    alert("動画を入れて！");
    return;

  }

  chunks = [];

  const stream = canvas.captureStream(30);

  mediaRecorder = new MediaRecorder(stream,{
    mimeType:"video/webm"
  });

  mediaRecorder.ondataavailable = e=>{

    if(e.data.size > 0){

      chunks.push(e.data);

    }

  };

  mediaRecorder.onstop = ()=>{

    const blob = new Blob(chunks,{
      type:"video/webm"
    });

    const url = URL.createObjectURL(blob);

    download.href = url;
    download.download = "transparent-video.webm";

    download.style.display = "inline";

  };

  recording = true;

  mediaRecorder.start();

  video.currentTime = 0;

  await video.play();

  render();

};

</script>

</body>
</html>
